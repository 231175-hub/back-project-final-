server.port=${PORT:8081}
spring.application.name=finalproject

spring.jackson.time-zone=America/Lima
spring.jackson.serialization.fail-on-empty-beans=false

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración Híbrida (Funciona en Local y se conecta automáticamente en Railway)
spring.datasource.url=jdbc:mysql://${MYSQLHOST:${DB_HOST:localhost}}:${MYSQLPORT:${DB_PORT:3306}}/${MYSQLDATABASE:${DB_DATABASE:projectFinal}}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Lima
spring.datasource.username=${MYSQLUSER:${DB_USER:root}}
spring.datasource.password=${MYSQLPASSWORD:${DB_PASSWORD:74047910maykolyuki}}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.generate-ddl=false
spring.jpa.properties.hibernate.hbm2ddl.auto=update
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Optimización extrema de memoria RAM para la capa gratuita/estándar de Railway
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

server.tomcat.threads.max=10
server.tomcat.threads.min-spare=2

file.upload-dir=storage

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=100MB

security.jwt.secret-key=kjBAwJFWJ3yPjKpNsGrJGKdsLFU6Us55oJ4KVT6z21lpyLpTHeyhurv5cgbwZ8ZQZxpAUYbjfkUK9JrlWcMZ7A==
security.jwt.expiration-time=3600000
security.jwt.refresh-expiration-time=604800000
logging.level.org.springframework.security=DEBUG