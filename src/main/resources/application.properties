server.port=${PORT:8081}
spring.application.name=finalproject


spring.jackson.time-zone=America/Lima
spring.jackson.serialization.fail-on-empty-beans=false

#spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_DATABASE}?useSSL=true&allowPublicKeyRetrieval=true
#spring.datasource.username=${DB_USER}
#spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.generate-ddl=false
spring.jpa.properties.hibernate.hbm2ddl.auto=update
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=4
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

server.tomcat.threads.max=15
server.tomcat.threads.min-spare=2

file.upload-dir=storage

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=100MB

security.jwt.secret-key=kjBAwJFWJ3yPjKpNsGrJGKdsLFU6Us55oJ4KVT6z21lpyLpTHeyhurv5cgbwZ8ZQZxpAUYbjfkUK9JrlWcMZ7A==
security.jwt.expiration-time=3600000

spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_URL}/realms/ProjectFinalKeyCloak
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_URL}/realms/ProjectFinalKeyCloak/protocol/openid-connect/certs

keycloak.admin.server-url=${KEYCLOAK_URL}
keycloak.admin.realm=master
keycloak.admin.client-id=admin-cli
keycloak.admin.username=${KEYCLOAK_ADMIN_USER}
keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD}
keycloak.target.realm=ProjectFinalKeyCloak
logging.level.org.springframework.security=DEBUG


