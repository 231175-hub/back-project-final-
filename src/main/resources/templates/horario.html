<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Horario Académico</title>
    <style>
        @page {
            size: A4 landscape;
            margin: 10mm; 
        }
        body {
            font-family: 'Helvetica', 'Arial', sans-serif;
            margin: 0;
            padding: 0;
        }
        .page-frame {
            border: 4px solid #1a3b70; 
            padding: 3px;
            position: relative;
            min-height: 165mm;
            box-sizing: border-box;
        }
        .page-inner-frame {
            border: 1px solid #c29b57;
            padding: 15px;
            min-height: 157mm;
            box-sizing: border-box;
            position: relative;
            z-index: 1;
        }
        .watermark {
            position: absolute;
            top: 25%;
            left: 50%;
            margin-left: -125px; 
            opacity: 0.12; 
            z-index: -1;
            width: 250px;
            height: auto;
            pointer-events: none;
            transform: translate(47px, 100px);
        }

        .header-table {
            width: 100%;
            margin-bottom: 10px;
            border-bottom: 3px solid #c29b57; 
            padding-bottom: 10px;
        }
        .header-table td {
            vertical-align: middle;
        }
        .logo-img {
            max-width: 65px;
            max-height: 65px;
        }
        .title-container {
            text-align: center;
        }
        .title {
            color: #1a3b70;
            font-size: 22px;
            font-weight: 900;
            margin: 0 0 5px 0;
            letter-spacing: 1px;
        }
        .subtitle {
            color: #555;
            font-size: 12px;
            font-weight: bold;
        }

        .student-info {
            width: 100%;
            margin-bottom: 15px;
            font-size: 11px;
        }
        .student-info td {
            padding: 2px 5px;
        }

        table.schedule-grid {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }
        .schedule-grid th {
            background-color: #1a3b70;
            color: #ffffff;
            padding: 5px;
            text-align: center;
            border: 1px solid #c29b57;
            text-transform: uppercase;
            font-size: 10px;
        }
        .schedule-grid td {
            border: 1px solid #d1d5db;
            text-align: center;
            vertical-align: top;
            height: 22px; 
            padding: 0;
        }
        .time-col {
            background-color: #f9fafb;
            width: 60px;
            font-weight: bold;
            color: #4b5563;
            vertical-align: middle !important;
            font-size: 10px;
            border-right: 2px solid #1a3b70 !important;
        }
        .time-small {
            display: block;
            font-size: 7px;
            color: #9ca3af;
            font-weight: normal;
        }

        .course-card {
            background-color: #f0f4fa;
            border-left: 3px solid #1a3b70;
            color: #1a3b70;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            display: table; 
        }
        .course-card.split-card {
            background-color: #fef2f2;
            border-left: 3px solid #ef4444;
            color: #991b1b;
        }
        .course-card.split-card .course-title {
            color: #991b1b;
        }
        .course-card.split-card .course-details {
            color: #7f1d1d;
        }
        .course-card-content {
            display: table-cell;
            vertical-align: middle;
            text-align: center;
            padding: 4px;
        }
        .course-title {
            font-weight: bold;
            font-size: 10px;
            text-transform: uppercase;
            display: block;
            margin-bottom: 2px;
            line-height: 1.2;
        }
        .course-details {
            font-size: 8px;
            color: #1a3b70;
            display: block;
        }
        .lunch-break {
            background-color: #f3f4f6; 
            color: #6b7280;
            vertical-align: middle !important;
            font-weight: bold;
            font-size: 10px;
            letter-spacing: 2px;
            border: 1px dashed #cbd5e1 !important;
        }
    </style>
</head>
<body>

    <div class="page-frame">
        <div class="page-inner-frame">
            <img th:src="@{classpath:/static/img/unamba-watermark.png}" class="watermark" />

        <table class="header-table">
            <tr>
                <td width="15%">
                    <img th:src="@{classpath:/static/img/unamba-logo-2.png}" class="logo-img" />
                </td>
                <td width="70%" class="title-container">
                    <h1 class="title">HORARIO ACADÉMICO</h1>
                    <div class="subtitle" th:text="${student.career}">UNIVERSIDAD NACIONAL MICAELA BASTIDAS DE APURÍMAC</div>
                </td>
                <td width="15%" style="text-align: right;">
                </td>
            </tr>
        </table>

        <table class="student-info">
            <tr>
                <td width="12%"><strong>Estudiante:</strong></td>
                <td width="58%" th:text="${student.fullName}"></td>
                <td width="15%"><strong>Semestre:</strong></td>
                <td width="15%" th:text="${student.semester}"></td>
            </tr>
            <tr>
                <td><strong>Código:</strong></td>
                <td th:text="${student.code}"></td>
                <td><strong>Fecha Impresión:</strong></td>
                <td th:text="${#dates.format(#dates.createNow(), 'dd/MM/yyyy')}"></td>
            </tr>
        </table>

        <table class="schedule-grid">
            <thead>
                <tr>
                    <th class="time-col">HORA</th>
                    <th th:each="day : ${daysOfWeek}" th:text="${day}"></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="hour : ${hours}">
                    
                    <td class="time-col">
                        <span th:text="${hour} + ':00'"></span>
                        <span class="time-small" th:text="${hour + 1} + ':00'"></span>
                    </td>
                    
                    <th:block th:each="day : ${daysOfWeek}">
                        <th:block th:if="${skipCells.get(day + '-' + hour) == null}">
                            <th:block th:with="lessons=${customSchedule.get(day + '-' + hour)}">
                                
                                <td th:if="${hour == 13 and (lessons == null or #lists.isEmpty(lessons))}" class="lunch-break">
                                    ALMUERZO
                                </td>

                                <td th:if="${hour != 13 or (lessons != null and !#lists.isEmpty(lessons))}" 
                                    th:with="dur=${durations.get(day + '-' + hour)}"
                                    th:attr="rowspan=${dur != null ? dur : 1}"
                                    th:style="${dur != null ? 'height: ' + (dur * 22) + 'px; padding: 1px 2px;' : 'height: 22px; padding: 1px 2px;'}">
                                    
                                    <div th:if="${lessons != null and !#lists.isEmpty(lessons)}" style="width: 100%; height: 100%; box-sizing: border-box; text-align: center; white-space: nowrap; display: table;">
                                        <div th:each="lesson : ${lessons}" 
                                             th:class="${#lists.size(lessons) > 1} ? 'course-card split-card' : 'course-card'" 
                                             th:style="${#lists.size(lessons) > 1} ? 'display: inline-block; width: 46%; margin: 1%; vertical-align: middle; box-sizing: border-box;' : 'display: table-cell; width: 100%; height: 100%; box-sizing: border-box; vertical-align: middle;'">
                                            <div class="course-card-content" style="padding: 2px;">
                                                <span class="course-title" th:text="${lesson.courseName()}" th:style="${#lists.size(lessons) > 1} ? 'font-size: 7px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;' : ''"></span>
                                                <span class="course-details" th:text="'G: ' + ${lesson.groupName()} + ' | A: ' + ${lesson.classroom()}" th:style="${#lists.size(lessons) > 1} ? 'font-size: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;' : ''"></span>
                                            </div>
                                        </div>
                                    </div>
                                </td>

                            </th:block>
                        </th:block>
                    </th:block>
                    
                </tr>
            </tbody>
        </table>

        </div>
    </div>

</body>
</html>
